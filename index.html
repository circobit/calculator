<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculator</title>
	<link href="./css/style.css" rel="stylesheet"></link>
	<script src="./js/script.js" defer></script>
</head>
<body>
	<div class="calculator">
		<div class="display">
			<span id="display">0</span>
			<span id="inlineDisplay"></span>
		</div>
		<div class="buttonsMainDiv">
			<div class="buttonsRow">
				<div class="buttonsTop">
					<div class="buttonsTopLeft">
						<button id="allClear">AC</button>
					</div>
					<div class="buttonsTopRight">
						<button class="operator">÷</button>
						<button class="operator" id="x">x</button>
					</div>
				</div>
			</div>
			<div class="buttonsColums">
				<div class="column1">
					<button class="number">7</button>
					<button class="number">4</button>
					<button class="number">1</button>
					<button class="number">0</button>
				</div>
				<div class="column2">
					<button class="number">8</button>
					<button class="number">5</button>
					<button class="number">2</button>
					<button class="number" id="dot">.</button>
				</div>
				<div class="column3">
					<button class="number">9</button>
					<button class="number">6</button>
					<button class="number">3</button>
					<button class="number" id="clear">C</button>
				</div>
				<div class="column4">
					<div class="column4a">
						<button class="operator">-</button>
						<button class="operator">+</button>
					</div>
					<div class="column4b">
						<button id="equal">=</button>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
